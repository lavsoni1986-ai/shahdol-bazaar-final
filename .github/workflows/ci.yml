name: Sovereign CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Type Check (Neural Audit)
        run: npm run check || echo "TSC bypass check"

      - name: Lint (Cleanliness Audit)
        run: npm run lint

      - name: Production Build Test
        run: npm run build